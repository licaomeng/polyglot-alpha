[mypy]
python_version = 3.11
# Note: sqlalchemy.ext.mypy.plugin disabled because it conflicts with sqlalchemy2-stubs
# (SA 2.0 mypy plugin refuses to load when third-party SA stubs are installed).
# We rely on sqlalchemy2-stubs for SQLAlchemy type information instead.
ignore_missing_imports = True
warn_unused_ignores = True
show_error_codes = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

# Strict mode for new code, lenient for legacy
[mypy-polyglot_alpha.judges.*]
strict = True

[mypy-polyglot_alpha.api.*]
strict = True

[mypy-polyglot_alpha.persistence.*]
strict = True

# Legacy / experimental modules — lenient
[mypy-polyglot_alpha.corpus.full_scraper]
ignore_errors = True
